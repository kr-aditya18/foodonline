{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>FoodOnline</title>

	<!-- Google Fonts (combined into one request) -->
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:400,700|Open+Sans:400,700,800&display=swap">

	<!-- CSS -->
	<link href="{% static 'css/iconmoon.css' %}" rel="stylesheet">
	<link href="{% static 'css/style.css' %}" rel="stylesheet">
	<link href="{% static 'css/cs-foodbakery-plugin.css' %}" rel="stylesheet">
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
	<link href="{% static 'css/bootstrap-slider.css' %}" rel="stylesheet">
	<link rel="stylesheet" href="{% static 'css/custom.css' %}">
	<link rel="stylesheet" href="{% static 'css/cart.css' %}">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

	<style>
		body, .main-section p, .mce-content-body p {
			font: Normal 14px/24px "Open Sans", sans-serif;
			letter-spacing: 0px;
			text-transform: none;
			color: var(--text) !important;
		}
	</style>
</head>

<body>

	<!-- Navbar -->
	{% include "includes/navbar.html" %}

	<!-- Page Content -->
	{% block content %}
	{% endblock content %}

	<!-- Footer -->
	{% include "includes/footer.html" %}

	<!-- Toast -->
	<div id="food-toast">
		<div class="toast-icon" id="toast-icon-box"></div>
		<div class="toast-body">
			<p class="toast-title" id="toast-title"></p>
			<p class="toast-sub"   id="toast-sub"></p>
		</div>
		<div class="toast-bar" id="toast-bar"></div>
	</div>

	<!-- Modal Overlay -->
	<div id="food-overlay">
		<div id="food-modal">
			<div class="modal-banner" id="modal-banner">
				<div class="modal-handle"></div>
				<span class="modal-emoji" id="modal-emoji"></span>
				<h2 class="modal-title"  id="modal-title"></h2>
				<p  class="modal-sub"    id="modal-sub"></p>
			</div>
			<div class="modal-body">
				<p id="modal-desc"></p>
				<div class="modal-actions" id="modal-actions"></div>
			</div>
		</div>
	</div>

	<!-- JS at bottom for faster page render -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
	<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
	<script src="{% static 'js/modernizr.js' %}"></script>
	<script src="{% static 'js/bootstrap.js' %}"></script>
	<script src="{% static 'js/scripts.js' %}"></script>
	<script src="{% static 'js/address_autocomplete.js' %}"></script>
	<script src="{% static 'js/custom.js' %}"></script>
	
</body>
</html>
