{% load i18n %}
<div id="id_{{ widget.attrs.id }}_map" class="olmap" style="width: {{ widget.attrs.map_width }}px; height: {{ widget.attrs.map_height }}px;"></div>
{{ widget.map_srid|json_script:"map_srid" }}

<script>
(function() {
    document.addEventListener('DOMContentLoaded', function () {
        const fieldName = "{{ widget.attrs.id }}";
        const wktValue = document.getElementById('id_' + fieldName)?.value;

        // Parse WKT POINT
        let lon = 0, lat = 0;
        if (wktValue) {
            const match = wktValue.match(/POINT\s*\(([^\)]+)\)/);
            if (match) {
                const parts = match[1].trim().split(/\s+/);
                lon = parseFloat(parts[0]);
                lat = parseFloat(parts[1]);
            }
        }

        // Fallback: read from lat/long fields on the page
        if (!lon || !lat) {
            const latField = document.getElementById('id_latitude');
            const lonField = document.getElementById('id_longitude');
            if (latField && lonField) {
                lat = parseFloat(latField.value) || 0;
                lon = parseFloat(lonField.value) || 0;
            }
        }

        const mapDiv = document.getElementById('id_' + fieldName + '_map');
        if (!mapDiv) return;

        // OSM tile layer
        const map = new ol.Map({
            target: mapDiv,
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM()
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([lon, lat]),
                zoom: 14
            }),
            interactions: ol.interaction.defaults({
                doubleClickZoom: false,
                dragPan: false,
                mouseWheelZoom: false,
                shiftDragZoom: false,
                dragRotate: false,
                dragZoom: false,
            }),
            controls: ol.control.defaults({
                zoom: false,
                attribution: false,
            }),
        });

        // Fixed marker
        const marker = new ol.Feature({
            geometry: new ol.geom.Point(ol.proj.fromLonLat([lon, lat]))
        });
        const vectorLayer = new ol.layer.Vector({
            source: new ol.source.Vector({ features: [marker] }),
            style: new ol.style.Style({
                image: new ol.style.Circle({
                    radius: 8,
                    fill: new ol.style.Fill({ color: '#e74c3c' }),
                    stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
                })
            })
        });
        map.addLayer(vectorLayer);
    });
})();
</script>
